<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zamfara State Help Request Portal</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#f2f5f9;
      overflow-x:hidden;
    }

    .hero{
      min-height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
      url('https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1400&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }

    .container{
      width:100%;
      max-width:950px;
      background:white;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.25);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .top-banner{
      background:linear-gradient(135deg,#0f7b3f,#0ca654);
      padding:35px;
      color:white;
      text-align:center;
    }

    .top-banner h1{
      font-size:38px;
      margin-bottom:10px;
      font-weight:700;
    }

    .top-banner p{
      opacity:0.95;
      font-size:16px;
    }

    .form-area{
      padding:40px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      margin-bottom:8px;
      font-weight:600;
      color:#1f2937;
    }

    input,
    select,
    textarea{
      padding:15px;
      border:1px solid #d1d5db;
      border-radius:12px;
      font-size:15px;
      transition:0.3s;
      background:#fafafa;
    }

    input:focus,
    select:focus,
    textarea:focus{
      outline:none;
      border-color:#0ca654;
      box-shadow:0 0 0 4px rgba(12,166,84,0.15);
      background:white;
    }

    textarea{
      resize:vertical;
      min-height:120px;
    }

    .upload-box{
      border:2px dashed #0ca654;
      border-radius:16px;
      padding:30px;
      text-align:center;
      background:#f8fff9;
      transition:0.3s;
    }

    .upload-box:hover{
      background:#effff2;
    }

    .upload-box p{
      margin-bottom:12px;
      color:#0f7b3f;
      font-weight:500;
    }

    .submit-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#0f7b3f,#0ca654);
      color:white;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    .submit-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 25px rgba(12,166,84,0.3);
    }

    .success{
      display:none;
      background:#d1fae5;
      color:#065f46;
      padding:18px;
      border-radius:12px;
      margin-bottom:20px;
      font-weight:600;
    }

    .footer{
      background:#0f172a;
      color:white;
      text-align:center;
      padding:20px;
      font-size:14px;
    }

    .loader{
      display:none;
      margin:auto;
      margin-top:20px;
      width:45px;
      height:45px;
      border:5px solid #ddd;
      border-top:5px solid #0ca654;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    @media(max-width:768px){

      .grid{
        grid-template-columns:1fr;
      }

      .top-banner h1{
        font-size:28px;
      }

      .form-area{
        padding:25px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <div class="container">

      <div class="top-banner">
        <h1>Zamfara State Government Help Portal</h1>
        <p>
          Request for financial or humanitarian assistance support
        </p>
      </div>

      <div class="form-area">

        <div class="success" id="successMessage">
          ✔️ Your request has been submitted successfully.
        </div>

        <form id="supportForm">

          <div class="grid">

            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="fullname" required>
            </div>

            <div class="form-group">
              <label>Gender</label>
              <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" name="phone" required>
            </div>

            <div class="form-group">
              <label>State of Origin</label>
              <input type="text" name="state" required>
            </div>

            <div class="form-group">
              <label>Nationality</label>
              <input type="text" name="nationality" required>
            </div>

            <div class="form-group">
              <label>Account Number</label>
              <input type="text" name="account" required>
            </div>

            <div class="form-group full">
              <label>Upload Images / Photos</label>

              <div class="upload-box">
                <p>Upload evidence photos or documents</p>
                <input
                  type="file"
                  name="photos"
                  accept="image/*,.pdf"
                  multiple
                >
              </div>
            </div>

            <div class="form-group full">
              <label>Evidence Showing Financial Hardship</label>

              <textarea
                name="evidence"
                placeholder="Explain your condition and why you need help..."
                required
              ></textarea>
            </div>

            <div class="form-group full">
              <label>Short Comments</label>

              <textarea
                name="comments"
                placeholder="Additional comments..."
              ></textarea>
            </div>

            <div class="form-group full">
              <button class="submit-btn" type="submit">
                Submit Request
              </button>
            </div>

          </div>

        </form>

        <div class="loader" id="loader"></div>

      </div>

      <div class="footer">
        © 2026 Zamfara State Government Assistance Portal
      </div>

    </div>

  </section>

  <script>

    const form = document.getElementById("supportForm");
    const loader = document.getElementById("loader");
    const successMessage = document.getElementById("successMessage");

    form.addEventListener("submit", async function(e){

      e.preventDefault();

      loader.style.display = "block";

      const formData = new FormData(form);

      try{

        const response = await fetch("http://localhost:5000/submit",{
          method:"POST",
          body:formData
        });

        const result = await response.json();

        loader.style.display = "none";

        if(result.success){

          successMessage.style.display = "block";

          form.reset();

          window.scrollTo({
            top:0,
            behavior:"smooth"
          });

        }else{
          alert("Submission failed.");
        }

      }catch(error){

        loader.style.display = "none";

        console.error(error);

        alert("Server error.");
      }

    });

  </script>

</body>
</html>
